<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="180" ry="180" fill="#0f0f1a"/>
  <!-- Subtle gradient overlay -->
  <rect width="1024" height="1024" rx="180" ry="180" fill="url(#bg-gradient)"/>
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a0a1a" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <!-- Video camera icon -->
  <g transform="translate(512, 512) scale(18)" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polygon points="23 7 16 12 23 17 23 7" fill="#6366f1" fill-opacity="0.3"/>
    <rect x="1" y="5" width="15" height="14" rx="2" ry="2" fill="#6366f1" fill-opacity="0.15"/>
  </g>
</svg>
